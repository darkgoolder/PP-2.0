name: CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.9'
  DOCKER_IMAGE_NAME: wagon-classifier-api
  DOCKER_REGISTRY: ghcr.io

jobs:
  # ============================================
  # JOB 1: Линтинг и проверка кода
  # ============================================
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      
      - name: Install dependencies
        run: |
          uv pip install --system flake8 isort pylint black mypy ruff
          uv pip install --system -r requirements.txt
      
      - name: Run isort (проверка сортировки импортов)
        run: isort --check-only --profile black app/
      
      - name: Run Black (проверка форматирования)
        run: black --check --diff --target-version py39 app/
      
      - name: Run Ruff (быстрый линтер)
        run: ruff check app/ --output-format=github
        continue-on-error: true
      
      - name: Run Flake8 (проверка стиля кода)
        run: flake8 app/ --count --max-complexity=10 --max-line-length=88 --statistics
        continue-on-error: true
      
      - name: Run Pylint (глубокий анализ кода)
        run: pylint app/ --fail-under=7 --exit-zero
        continue-on-error: true
      
      - name: Run mypy (проверка типов)
        run: mypy app/ --ignore-missing-imports --no-strict-optional --python-version 3.9
        continue-on-error: true

  # ============================================
  # JOB 2: Тестирование с PostgreSQL
  # ============================================
  test:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ['3.9']
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: wagon_user
          POSTGRES_PASSWORD: wagon_pass
          POSTGRES_DB: wagon_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      
      - name: Install dependencies
        run: |
          uv pip install --system pytest pytest-asyncio pytest-cov httpx
          uv pip install --system asyncpg sqlalchemy bcrypt
          uv pip install --system -r requirements.txt
      
      - name: Create directories for tests
        run: mkdir -p models uploads
      
      - name: Create dummy model for tests
        run: python scripts/create_dummy_model.py
      
      - name: Wait for PostgreSQL to be ready
        run: |
          for i in {1..30}; do
            if pg_isready -h localhost -p 5432 -U wagon_user; then
              echo "PostgreSQL is ready"
              break
            fi
            echo "Waiting for PostgreSQL... $i/30"
            sleep 2
          done
      
      # ============================================
      # ЗАПУСК ТЕСТОВ
      # ============================================
      - name: Run tests
        id: tests
        run: |
          pytest tests/unit/ -v \
            --cov=app \
            --cov-report=term \
            --cov-report=xml:coverage.xml \
            --junitxml=test-results.xml
        env:
          PYTHONPATH: .
          MODEL_PATH: models/best_model.pth
          DATABASE_URL: postgresql+asyncpg://wagon_user:wagon_pass@localhost:5432/wagon_db
          TESTING: "true"
      
      # ============================================
      # ПОЛУЧИТЬ ПРОЦЕНТ ПОКРЫТИЯ
      # ============================================
      - name: Get coverage percentage
        id: coverage
        run: |
          COVERAGE=$(coverage report --skip-covered --skip-empty | grep TOTAL | awk '{print $NF}' | sed 's/%//')
          echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT
          echo "✅ Coverage: ${COVERAGE}%"
      
      # ============================================
      # ПОЛУЧИТЬ СТАТИСТИКУ ТЕСТОВ
      # ============================================
      - name: Parse test results
        id: stats
        run: |
          TOTAL=$(python -c "import xml.etree.ElementTree as ET; tree=ET.parse('test-results.xml'); print(tree.getroot().attrib.get('tests', '0'))")
          FAILED=$(python -c "import xml.etree.ElementTree as ET; tree=ET.parse('test-results.xml'); print(tree.getroot().attrib.get('failures', '0'))")
          SKIPPED=$(python -c "import xml.etree.ElementTree as ET; tree=ET.parse('test-results.xml'); print(tree.getroot().attrib.get('skipped', '0'))")
          PASSED=$((TOTAL - FAILED - SKIPPED))
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "skipped=$SKIPPED" >> $GITHUB_OUTPUT
      
      # ============================================
      # ПРОФЕССИОНАЛЬНЫЙ ОТЧЁТ В CHECKS
      # ============================================
      - name: Create detailed report
        uses: actions/github-script@v7
        with:
          script: |
            const coverage = '${{ steps.coverage.outputs.coverage }}';
            const total = '${{ steps.stats.outputs.total }}';
            const passed = '${{ steps.stats.outputs.passed }}';
            const failed = '${{ steps.stats.outputs.failed }}';
            const skipped = '${{ steps.stats.outputs.skipped }}';
            const passedPercent = total > 0 ? Math.round((passed / total) * 100) : 0;
            
            const statusIcon = coverage >= 70 ? '✅' : '❌';
            const passIcon = failed == 0 ? '✅' : '❌';
            
            const summary = `
            ## 📊 Отчёт о тестировании
            \n
            ### 🧪 Результаты тестов
            | Показатель | Значение | Статус |
            |------------|----------|--------|
            | **Всего тестов** | ${total} | — |
            | **Пройдено** | ${passed} (${passedPercent}%) | ${passIcon} |
            | **Провалено** | ${failed} | ${failed > 0 ? '❌' : '✅'} |
            | **Пропущено** | ${skipped} | — |
            \n
            ### 📈 Покрытие кода
            | Показатель | Значение | Требование | Статус |
            |------------|----------|------------|--------|
            | **Unit test coverage** | **${coverage}%** | >70% | ${coverage >= 70 ? '✅ Выполнено' : '❌ Не выполнено'} |
            \n
            ### 🎯 Общий вердикт
            ${coverage >= 70 && failed == 0 ? '✅ **РЕЗУЛЬТАТ: ПРИНЯТО** — все требования выполнены' : '❌ **РЕЗУЛЬТАТ: ОТКЛОНЕНО** — требования не выполнены'}
            `;
            
            await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: '📊 Unit Test Coverage',
              head_sha: context.sha,
              status: 'completed',
              conclusion: (coverage >= 70 && failed == 0) ? 'success' : 'failure',
              output: {
                title: `Покрытие: ${coverage}% | Тесты: ${passed}/${total} пройдено`,
                summary: summary
              }
            });
      
      # ============================================
      # ПРОВАЛИТЬ СБОРКУ ЕСЛИ ПОКРЫТИЕ < 70%
      # ============================================
      - name: Check threshold
        run: |
          COVERAGE=${{ steps.coverage.outputs.coverage }}
          if [ "$COVERAGE" -lt 70 ]; then
            echo "❌ Coverage ${COVERAGE}% is below 70%"
            exit 1
          fi
      
      # ============================================
      # ЗАГРУЗКА АРТЕФАКТОВ
      # ============================================
      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            test-results.xml
            coverage.xml
        if: always()
      
      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: test-results.xml
          detailed_summary: true
        if: always()


    # ============================================
  # JOB 3: API Endpoint Tests
  # ============================================
  api-test:
    runs-on: ubuntu-latest
    needs: test
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: wagon_user
          POSTGRES_PASSWORD: wagon_pass
          POSTGRES_DB: wagon_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      
      - name: Install dependencies
        run: |
          uv pip install --system fastapi uvicorn httpx
          uv pip install --system asyncpg sqlalchemy bcrypt
          uv pip install --system torch torchvision --index-url https://download.pytorch.org/whl/cpu
          uv pip install --system -r requirements.txt
      
      - name: Create directories
        run: mkdir -p models uploads
      
      - name: Create dummy model
        run: |
          python -c "
          import torch
          import torch.nn as nn
          from torchvision import models

          model = models.efficientnet_b2(weights=None)
          num_classes = 3
          in_features = model.classifier[1].in_features
          model.classifier = nn.Sequential(
              nn.Dropout(p=0.3),
              nn.Linear(in_features, num_classes)
          )
          torch.save({
              'model_state_dict': model.state_dict(),
              'class_names': ['pered', 'zad', 'none']
          }, 'models/best_model.pth')
          print('✅ Dummy model created')
          "
      
      - name: Start API server
        run: |
          DATABASE_URL="postgresql+asyncpg://wagon_user:wagon_pass@localhost:5432/wagon_db" \
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 10
      
      - name: Wait for API to be ready
        run: |
          for i in {1..30}; do
            if curl -s -f http://localhost:8000/api/v1/health > /dev/null 2>&1; then
              echo "API is ready"
              break
            fi
            echo "Waiting for API... $i/30"
            sleep 2
          done
      
      - name: Test endpoints
        run: |
          echo "=== Health Check ==="
          curl -s http://localhost:8000/api/v1/health
          echo ""
          
          echo "=== Register ==="
          curl -s -X POST http://localhost:8000/api/v1/register \
            -H "Content-Type: application/json" \
            -d '{"username":"apitestuser","email":"api@test.com","password":"test123"}'
          echo ""
          
          echo "=== Login ==="
          curl -s -X POST http://localhost:8000/api/v1/login \
            -H "Content-Type: application/json" \
            -d '{"username":"apitestuser","password":"test123"}'
          echo ""
          
          echo "=== Get Users ==="
          curl -s http://localhost:8000/api/v1/users
          echo ""
      
      - name: Stop API server
        run: kill $(lsof -t -i:8000) || true

  # ============================================
  # JOB 4: Тесты без БД (для быстрой проверки)
  # ============================================
  test-light:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      
      - name: Install dependencies
        run: |
          uv pip install --system pytest pytest-asyncio
          uv pip install --system -r requirements.txt
      
      - name: Create dummy model
        run: |
          mkdir -p models
          python scripts/create_dummy_model.py
      
      - name: Run basic tests (without DB)
        run: pytest tests/test_dummy.py tests/test_model_compatibility.py -v
        env:
          PYTHONPATH: .
          MODEL_PATH: models/best_model.pth

  # ============================================
  # JOB 5: Сборка Docker образа
  # ============================================
  docker-build:
    runs-on: ubuntu-latest
    needs: [test, test-light, api-test]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
  
    steps:
      - name: Free disk space
        run: |
          docker system prune -a -f
          docker volume prune -f
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          df -h
      
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ github.repository_owner }}/${{ env.DOCKER_IMAGE_NAME }}
          tags: |
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
            type=raw,value=${{ github.ref_name }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_CONTEXT_KEEP_GIT_DIR=1

  # ============================================
  # JOB 6: Уведомления
  # ============================================
  notify:
    runs-on: ubuntu-latest
    needs: [lint, test, test-light, api-test, docker-build]
    if: always()
    
    steps:
      - name: Check status
        id: status
        run: |
          if [ "${{ needs.lint.result }}" == "success" ] && \
             [ "${{ needs.test.result }}" == "success" ] && \
             [ "${{ needs.test-light.result }}" == "success" ] && \
             [ "${{ needs.api-test.result }}" == "success" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
          fi
      
      - name: Send GitHub check
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ steps.status.outputs.status }}';
            const conclusion = status === 'success' ? 'success' : 'failure';
            await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'CI/CD Pipeline',
              head_sha: context.sha,
              status: 'completed',
              conclusion: conclusion,
              output: {
                title: `Pipeline ${conclusion}`,
                summary: `Lint: ${{ needs.lint.result }}\nTest: ${{ needs.test.result }}\nTest Light: ${{ needs.test-light.result }}\nAPI Test: ${{ needs.api-test.result }}\nDocker: ${{ needs.docker-build.result }}`
              }
            });
      
      # - name: Send to Telegram (опционально)
      #   if: secrets.TELEGRAM_BOT_TOKEN != '' && secrets.TELEGRAM_CHAT_ID != ''
      #   uses: appleboy/telegram-action@master
      #   with:
      #     to: ${{ secrets.TELEGRAM_CHAT_ID }}
      #     token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      #     message: |
      #       🚀 CI/CD Pipeline
            
      #       Repository: ${{ github.repository }}
      #       Branch: ${{ github.ref_name }}
      #       Status: ${{ steps.status.outputs.status }}
            
      #       Lint: ${{ needs.lint.result }}
      #       Tests: ${{ needs.test.result }}
      #       API Tests: ${{ needs.api-test.result }}
      #       Docker: ${{ needs.docker-build.result }}
            
      #       Commit: ${{ github.event.head_commit.message }}
      #       Author: ${{ github.event.head_commit.author.name }}