name: CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.9'
  DOCKER_IMAGE_NAME: wagon-classifier-api
  DOCKER_REGISTRY: ghcr.io

jobs:
  # ============================================
  # JOB 1: Линтинг и проверка кода
  # ============================================
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      
      - name: Install dependencies
        run: |
          uv pip install --system flake8 isort pylint black mypy ruff
          uv pip install --system -r requirements.txt
      
      - name: Run isort (проверка сортировки импортов)
        run: isort --check-only --profile black app/
      
      - name: Run Black (проверка форматирования)
        run: black --check --diff --target-version py39 app/
      
      - name: Run Ruff (быстрый линтер)
        run: ruff check app/ --output-format=github
        continue-on-error: true
      
      - name: Run Flake8 (проверка стиля кода)
        run: flake8 app/ --count --max-complexity=10 --max-line-length=88 --statistics
        continue-on-error: true
      
      - name: Run Pylint (глубокий анализ кода)
        run: pylint app/ --fail-under=7 --exit-zero
        continue-on-error: true
      
      - name: Run mypy (проверка типов)
        run: mypy -p app --ignore-missing-imports --no-strict-optional --python-version 3.9
        continue-on-error: true

  # ============================================
  # JOB 2: Тестирование с PostgreSQL
  # ============================================
  test:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ['3.9']
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: wagon_user
          POSTGRES_PASSWORD: wagon_pass
          POSTGRES_DB: wagon_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      
      - name: Install dependencies
        run: |
          uv pip install --system pytest pytest-asyncio pytest-cov httpx
          uv pip install --system asyncpg sqlalchemy bcrypt
          uv pip install --system -r requirements.txt
      
      - name: Create directories for tests
        run: mkdir -p models uploads
      
      - name: Wait for PostgreSQL to be ready
        run: |
          for i in {1..30}; do
            if pg_isready -h localhost -p 5432 -U wagon_user; then
              echo "PostgreSQL is ready"
              break
            fi
            echo "Waiting for PostgreSQL... $i/30"
            sleep 2
          done
      
      - name: Run tests
        run: |
          pytest tests/unit/ -v \
            --cov=app \
            --cov-report=term
        env:
          PYTHONPATH: .
          MODEL_PATH: models/best_model.pth
          DATABASE_URL: postgresql+asyncpg://wagon_user:wagon_pass@localhost:5432/wagon_db
          TESTING: "true"
          SECRET_KEY: "test-secret-key-for-ci"
      
      - name: Show coverage
        run: |
          echo ""
          echo "=========================================="
          echo "UNIT TEST COVERAGE REPORT"
          echo "=========================================="
          echo ""
          
          coverage report
          
          echo ""
          echo "=========================================="
          echo "FILES WITH 100% COVERAGE:"
          echo "=========================================="
          coverage report | grep "100%" | grep -v "TOTAL" || echo "None"
          
          echo ""
          echo "=========================================="
          echo "TOTAL COVERAGE: $(coverage report | grep TOTAL | awk '{print $NF}')"
          echo "=========================================="
      
      - name: Check threshold
        run: |
          COVERAGE=$(coverage report --skip-covered --skip-empty | grep TOTAL | awk '{print $NF}' | sed 's/%//')
          if [ "$COVERAGE" -lt 70 ]; then
            echo "FAILED: Coverage ${COVERAGE}% < 70%"
            exit 1
          fi
          echo "PASSED: Coverage ${COVERAGE}% >= 70%"
      
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
        if: always()

