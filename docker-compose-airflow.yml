version: '3.8'

services:
  postgres-airflow:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_airflow_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - airflow_network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - airflow_network

  airflow-webserver:
    image: apache/airflow:2.8.1-python3.11
    depends_on:
      - postgres-airflow
      - redis
    environment:
      AIRFLOW__CORE__EXECUTOR: CeleryExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-airflow:5432/airflow
      AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@postgres-airflow:5432/airflow
      AIRFLOW__CELERY__BROKER_URL: redis://redis:6379/0
      AIRFLOW__CORE__FERNET_KEY: ${FERNET_KEY:-46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLbfzqDDho=}
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'True'
      AIRFLOW__CORE__LOAD_EXAMPLES: 'False'
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
      AIRFLOW__WEBSERVER__RBAC: 'True'
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
      _PIP_ADDITIONAL_REQUIREMENTS: pydantic-settings sqlalchemy asyncpg psycopg2-binary bcrypt minio apache-airflow-providers-docker
      DOCKER_HOST: unix://var/run/docker.sock
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
      - ./app:/opt/airflow/app
      - ./models:/opt/airflow/models
      - ./scripts:/opt/airflow/scripts
      - ./wagon_classification:/data
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8080:8080"
    command: webserver
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    networks:
      - airflow_network

  airflow-scheduler:
    image: apache/airflow:2.8.1-python3.11
    depends_on:
      - postgres-airflow
      - redis
    environment:
      AIRFLOW__CORE__EXECUTOR: CeleryExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-airflow:5432/airflow
      AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@postgres-airflow:5432/airflow
      AIRFLOW__CELERY__BROKER_URL: redis://redis:6379/0
      AIRFLOW__CORE__FERNET_KEY: ${FERNET_KEY:-46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLbfzqDDho=}
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'True'
      AIRFLOW__CORE__LOAD_EXAMPLES: 'False'
      _PIP_ADDITIONAL_REQUIREMENTS: pydantic-settings sqlalchemy asyncpg psycopg2-binary bcrypt torch torchvision minio apache-airflow-providers-docker
      DOCKER_HOST: unix://var/run/docker.sock
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
      - ./app:/opt/airflow/app
      - ./models:/opt/airflow/models
      - ./scripts:/opt/airflow/scripts
      - ./wagon_classification:/data
      - /var/run/docker.sock:/var/run/docker.sock
    command: scheduler
    restart: unless-stopped
    networks:
      - airflow_network

  airflow-worker:
    image: apache/airflow:2.8.1-python3.11
    depends_on:
      - postgres-airflow
      - redis
    environment:
      AIRFLOW__CORE__EXECUTOR: CeleryExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-airflow:5432/airflow
      AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@postgres-airflow:5432/airflow
      AIRFLOW__CELERY__BROKER_URL: redis://redis:6379/0
      AIRFLOW__CORE__FERNET_KEY: ${FERNET_KEY:-46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLbfzqDDho=}
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'True'
      AIRFLOW__CORE__LOAD_EXAMPLES: 'False'
      _PIP_ADDITIONAL_REQUIREMENTS: pydantic-settings sqlalchemy asyncpg psycopg2-binary bcrypt torch torchvision minio apache-airflow-providers-docker
      DOCKER_HOST: unix://var/run/docker.sock
    volumes:
      - ./backup:/backup
      - /var/run/docker.sock:/var/run/docker.sock
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
      - ./app:/opt/airflow/app
      - ./models:/opt/airflow/models
      - ./scripts:/opt/airflow/scripts
      - ./wagon_classification:/data
      - /var/run/docker.sock:/var/run/docker.sock
    command: celery worker
    restart: unless-stopped
    networks:
      - airflow_network

  airflow-init:
    image: apache/airflow:2.8.1-python3.11
    depends_on:
      - postgres-airflow
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-airflow:5432/airflow
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db init
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com
        exit 0
    restart: "no"
    networks:
      - airflow_network

volumes:
  postgres_airflow_data:

networks:
  airflow_network:
    driver: bridge