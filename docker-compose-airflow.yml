version: '3.8'

services:
  postgres-airflow:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${AIRFLOW_DB_USER}
      POSTGRES_PASSWORD: ${AIRFLOW_DB_PASSWORD}
      POSTGRES_DB: ${AIRFLOW_DB_NAME}
    volumes:
      - postgres_airflow_data:/var/lib/postgresql/data
      - ./scripts/daily_report.py:/opt/airflow/daily_report.py:ro
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AIRFLOW_DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - airflow_network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - airflow_network

  airflow-webserver:
    image: apache/airflow:2.8.1-python3.11
    depends_on:
      - postgres-airflow
      - redis
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@postgres-airflow:5432/${AIRFLOW_DB_NAME}
      AIRFLOW__WEBSERVER__RBAC: 'True'
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
      _PIP_ADDITIONAL_REQUIREMENTS: pydantic==2.5.0 pydantic-settings==2.1.0 sqlalchemy asyncpg psycopg2-binary bcrypt minio apache-airflow-providers-docker
      AIRFLOW__CORE__FERNET_KEY: "hHZDFy62ombK2mc_PoSAHOmiuRS5_s1V8kD-cKAPdxI="
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
      - ./app:/opt/airflow/app
      - ./models:/opt/airflow/models
      - ./scripts:/opt/airflow/scripts
      - ./wagon_classification:/data
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8080:8080"
    command: webserver
    restart: unless-stopped
    networks:
      - airflow_network

  airflow-scheduler:
    image: apache/airflow:2.8.1-python3.11
    depends_on:
      - postgres-airflow
      - redis
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@postgres-airflow:5432/${AIRFLOW_DB_NAME}
      _PIP_ADDITIONAL_REQUIREMENTS: pydantic-settings sqlalchemy asyncpg psycopg2-binary bcrypt torch torchvision minio apache-airflow-providers-docker
      AIRFLOW__CORE__FERNET_KEY: "hHZDFy62ombK2mc_PoSAHOmiuRS5_s1V8kD-cKAPdxI="
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
      - ./app:/opt/airflow/app
      - ./models:/opt/airflow/models
      - ./scripts:/opt/airflow/scripts
      - ./wagon_classification:/data
      - /var/run/docker.sock:/var/run/docker.sock
    command: scheduler
    restart: unless-stopped
    networks:
      - airflow_network

  airflow-worker:
    image: apache/airflow:2.8.1-python3.11
    depends_on:
      - postgres-airflow
      - redis
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@postgres-airflow:5432/${AIRFLOW_DB_NAME}
      _PIP_ADDITIONAL_REQUIREMENTS: pydantic-settings sqlalchemy asyncpg psycopg2-binary bcrypt torch torchvision minio apache-airflow-providers-docker
      AIRFLOW__CORE__FERNET_KEY: "hHZDFy62ombK2mc_PoSAHOmiuRS5_s1V8kD-cKAPdxI="
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
      - ./app:/opt/airflow/app
      - ./models:/opt/airflow/models
      - ./scripts:/opt/airflow/scripts
      - ./wagon_classification:/data
      - /var/run/docker.sock:/var/run/docker.sock
    command: celery worker
    restart: unless-stopped
    networks:
      - airflow_network

  airflow-init:
    image: apache/airflow:2.8.1-python3.11
    depends_on:
      - postgres-airflow
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@postgres-airflow:5432/${AIRFLOW_DB_NAME}
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db init
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com
        exit 0
    restart: "no"
    networks:
      - airflow_network

volumes:
  postgres_airflow_data:

networks:
  airflow_network:
    driver: bridge