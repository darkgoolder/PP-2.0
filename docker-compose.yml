version: '3.8'

services:
  api:
    build: .
    ports:
      - "7860:7860"  # Изменено с 8000 на 7860 для единообразия с HF Spaces
    volumes:
      - ./models:/home/user/app/models  # Обновлен путь для Docker
      - ./uploads:/home/user/app/uploads
      - ./app:/home/user/app/app
      - ./logs:/home/user/app/logs
    environment:
      - MODEL_PATH=/home/user/app/models/best_model.pth  # Обновлен путь
      - LOG_LEVEL=INFO
      - PORT=7860
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/health"]  # Порт изменен
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s